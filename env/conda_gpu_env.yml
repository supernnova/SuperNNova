name: supernnova-cuda
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # PyTorch 2.0 linked against an old MKL ITT layout that no longer ships
  # in mkl 2024.x, causing `undefined symbol: iJIT_NotifyEvent` at import
  # time. PyTorch >=2.1 was built without that dependency. The mkl<2024
  # pin is a belt-and-braces guard in case the solver picks an older
  # pytorch build.
  - pytorch>=2.1,<2.5
  - pytorch-cuda=11.8
  - mkl<2024

  - pip
  - pip:
      - poetry>=2.0,<3.0
